<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Radial Dial Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #EAE6DF;
            --text-color: #111111;
            --text-muted: #777777;
            --line-color: #BBBBBB;
            --active-color: #D32F2F;
            --card-width: 320px;
            --card-height: 180px;
        }

        body {
            margin: 0; padding: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            user-select: none; -webkit-user-select: none;
            cursor: none;
        }

        /* ── CURSOR ── */
        #cursor-crosshair {
            position: fixed; width: 30px; height: 30px;
            pointer-events: none; z-index: 9000;
            will-change: transform;
        }
        #cursor-crosshair::before, #cursor-crosshair::after {
            content: ""; position: absolute; background: var(--active-color);
        }
        #cursor-crosshair::before { width: 100%; height: 1px; top: 50%; left: 0; }
        #cursor-crosshair::after  { height: 100%; width: 1px; left: 50%; top: 0; }

        /* ── BOOT SEQUENCE ── */
        #boot-screen {
            position: fixed; inset: 0;
            background: #0a0a0a;
            z-index: 8000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: flex-start;
            padding: 60px;
            box-sizing: border-box;
            transition: opacity 0.6s ease;
        }
        #boot-screen.fade-out { opacity: 0; pointer-events: none; }
        #boot-lines {
            font-family: "Courier New", Courier, monospace;
            font-size: 11px;
            color: #33ff33;
            line-height: 2;
            letter-spacing: 1px;
            max-width: 600px;
        }
        #boot-lines .line { display: block; opacity: 0; }
        #boot-lines .line.show { opacity: 1; }
        #boot-lines .line.red { color: var(--active-color); }
        #boot-lines .line.dim { color: #4a774a; }
        #boot-cursor {
            display: inline-block; width: 8px; height: 14px;
            background: #33ff33; vertical-align: middle;
            animation: blink 0.7s step-end infinite;
            margin-left: 4px;
        }
        @keyframes blink { 50% { opacity: 0; } }
        #boot-skip {
            position: absolute; bottom: 40px; right: 40px;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px; color: #2a5a2a;
            letter-spacing: 1px;
        }

        /* ── HUD ELEMENTS ── */
        .system-block {
            position: fixed; top: 40px; left: 40px;
            z-index: 100; pointer-events: none;
        }
        .metadata-block {
            font-family: "Courier New", Courier, monospace;
            font-size: 10px; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 1.5px; line-height: 1.8;
        }
        .meta-label { color: var(--text-color); font-weight: bold; }
        .meta-value  { color: var(--active-color); }

        .header-block {
            position: fixed; top: 40px; right: 40px;
            text-align: right; z-index: 100; pointer-events: none;
        }
        .title-pixel {
            font-family: 'Press Start 2P', monospace; font-size: 14px;
            text-transform: lowercase; color: #dcd8d1;
            text-shadow: -1px -1px 0 rgba(17,17,17,0.2), 1px 1px 0 rgba(255,255,255,0.8);
            margin-bottom: 8px;
        }
        .subtitle-pixel {
            font-family: 'Press Start 2P', monospace; font-size: 9px;
            text-transform: uppercase; color: #dcd8d1;
            text-shadow: -1px -1px 0 rgba(17,17,17,0.2), 1px 1px 0 rgba(255,255,255,0.8);
        }

        #degree-indicator {
            position: fixed; bottom: 40px; right: 40px;
            font-size: 28px; font-weight: 700;
            font-family: "Courier New", Courier, monospace;
            color: var(--active-color); z-index: 100;
            pointer-events: none; letter-spacing: 1px;
        }
        #hint {
            position: fixed; bottom: 40px; left: 40px;
            font-family: "Courier New", Courier, monospace;
            font-size: 9px; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 1.5px;
            pointer-events: none; line-height: 1.6; opacity: 0.7;
        }

        /* ── SEARCH OVERLAY ── */
        #search-overlay {
            position: fixed; inset: 0;
            background: rgba(234,230,223,0.97);
            z-index: 6000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start;
            padding-top: 15vh;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
        }
        #search-overlay.visible { opacity: 1; pointer-events: auto; }
        #search-wrap {
            width: 90%; max-width: 640px;
            border-bottom: 2px solid var(--text-color);
            display: flex; align-items: center; gap: 16px;
            padding-bottom: 12px; margin-bottom: 32px;
        }
        #search-label {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px; color: var(--active-color);
            white-space: nowrap; letter-spacing: 1px;
        }
        #search-input {
            flex: 1; background: none; border: none; outline: none;
            font-family: "Courier New", Courier, monospace;
            font-size: 18px; color: var(--text-color);
            caret-color: var(--active-color);
            cursor: text;
        }
        #search-results {
            width: 90%; max-width: 640px;
            max-height: 50vh; overflow-y: auto;
        }
        .search-result-item {
            display: flex; align-items: center; gap: 16px;
            padding: 10px 0;
            border-bottom: 1px solid var(--line-color);
            cursor: pointer;
            transition: padding-left 0.15s ease;
        }
        .search-result-item:hover { padding-left: 8px; }
        .search-result-item:hover .sr-title { color: var(--active-color); }
        .sr-idx {
            font-family: "Courier New", Courier, monospace;
            font-size: 10px; color: var(--text-muted); min-width: 28px;
        }
        .sr-title {
            font-size: 12px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px;
            flex: 1; transition: color 0.15s;
        }
        .sr-tag {
            font-family: "Courier New", Courier, monospace;
            font-size: 8px; padding: 2px 6px;
            border: 1px solid currentColor; letter-spacing: 1px;
        }
        #search-esc-hint {
            position: absolute; bottom: 40px; right: 40px;
            font-family: "Courier New", Courier, monospace;
            font-size: 9px; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 1.5px;
        }

        /* ── SCENE ── */
        #scene {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            perspective: 2000px;
        }
        #tilt-container {
            position: relative; transform-style: preserve-3d;
            transform: scale(0.8) rotateX(68deg);
            transition: transform 0.3s ease;
        }
        #dial {
            position: relative; transform-style: preserve-3d;
            will-change: transform;
        }
        .item {
            position: absolute; left: 0; top: 0;
            transform-style: preserve-3d;
        }
        .card-wrapper {
            position: absolute;
            left: calc(var(--card-width) / -2);
            top: calc(var(--card-height) * -1);
            width: var(--card-width); height: var(--card-height);
            transform-origin: bottom center;
            transform: translateZ(160px) rotateX(90deg) rotateY(-65deg);
            background: white; padding: 4px; box-sizing: border-box;
            border: 1px solid #111;
            pointer-events: auto; cursor: pointer;
            transition: transform 0.5s cubic-bezier(0.2,0.8,0.2,1.2), box-shadow 0.4s ease;
        }
        .card-wrapper img {
            width: 100%; height: 100%; object-fit: cover;
            background: #ccc; display: block;
            border: 1px solid #111; box-sizing: border-box;
            transform: rotate(180deg) scaleX(-1);
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            filter: grayscale(1) contrast(0.9) opacity(0.8);
            transition: filter 0.4s ease;
            pointer-events: none;
        }
        .line {
            position: absolute; left: -1px; top: -450px;
            width: 1px; height: 750px;
            background-color: var(--line-color);
            transform-origin: top center;
        }
        .info {
            position: absolute; left: 0; top: 100px;
            transform-origin: top left;
            transform: rotate(-90deg) translateX(-100%) translateY(calc(-100% - 10px));
            text-align: left; white-space: nowrap;
            transition: color 0.3s ease, transform 0.5s cubic-bezier(0.2,0.8,0.2,1.2);
            pointer-events: none; max-width: 400px;
        }
        .title {
            font-size: 11px; font-weight: 700;
            text-transform: uppercase; color: var(--text-color);
            margin-bottom: 2px; letter-spacing: 0.5px;
            transition: color 0.3s ease, font-size 0.3s ease;
        }
        .stats {
            font-size: 9px; font-family: "Courier New", Courier, monospace;
            color: var(--text-muted); letter-spacing: 1px;
            transition: color 0.3s ease, font-size 0.3s ease;
        }
        .stats .role { display: block; }
        .stats .year { display: block; opacity: 0.6; }
        .item.active .info {
            transform: rotate(-90deg) translateX(calc(-100% - 25px)) translateY(calc(-100% - 15px)) scale(1.1);
        }
        .item.active .title { color: var(--active-color); font-size: 14px; letter-spacing: 1px; }
        .item.active .stats { color: var(--text-color); font-size: 11px; }
        .item.active .card-wrapper {
            transform: translateZ(410px) rotateX(90deg) rotateY(-65deg) scale(1.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .item.active .card-wrapper img {
            filter: grayscale(0) contrast(1.1) brightness(1.05) opacity(1);
            outline: 2px solid var(--active-color); outline-offset: -2px;
            animation: pulse-border 2s ease-in-out infinite;
        }
        @keyframes pulse-border {
            0%,100% { outline-color: var(--active-color); }
            50%      { outline-color: transparent; }
        }

        /* ── EMBOSSED COMING SOON CARD ── */
        .embossed-card {
            position: absolute; inset: 0;
            background: #D8D4CC;
            display: flex; align-items: center; justify-content: center;
            transform: rotate(180deg) scaleX(-1);
        }
        .embossed-card span {
            font-family: 'Press Start 2P', monospace;
            font-size: 8px; letter-spacing: 2px;
            text-transform: uppercase;
            color: transparent;
            text-shadow:
                1px 1px 0px rgba(255,255,255,0.8),
                -1px -1px 0px rgba(0,0,0,0.15);
            user-select: none;
        }
        .item.active .embossed-card span { font-size: 10px; }

        /* Coming soon modal */
        #coming-soon-modal {
            position: fixed; inset: 0;
            background: rgba(234,230,223,0.98);
            z-index: 4000;
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.4s ease;
            cursor: auto;
        }
        #coming-soon-modal.visible { opacity: 1; }
        .cs-modal-inner {
            width: 85%; max-width: 700px;
            background: #D8D4CC;
            border: 2px solid #111;
            box-shadow: 15px 15px 0 var(--text-color);
            padding: 80px 60px;
            box-sizing: border-box;
            display: flex; flex-direction: column;
            align-items: center; gap: 20px;
        }
        .cs-modal-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 20px; letter-spacing: 4px;
            text-transform: uppercase;
            color: transparent;
            text-shadow:
                2px 2px 0px rgba(255,255,255,0.9),
                -1px -1px 0px rgba(0,0,0,0.12);
        }
        .cs-modal-project {
            font-family: "Courier New", Courier, monospace;
            font-size: 10px; letter-spacing: 2px;
            text-transform: uppercase;
            color: transparent;
            text-shadow:
                1px 1px 0px rgba(255,255,255,0.7),
                -1px -1px 0px rgba(0,0,0,0.1);
        }
        .coming-soon-close {
            position: absolute; top: 40px; right: 40px;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px; color: var(--active-color);
            background: none; border: none; cursor: pointer;
            letter-spacing: 1px; text-transform: uppercase;
        }

        #selector-line {
            position: absolute; left: 50%; top: 50%;
            width: 2px; height: 780px;
            background-color: var(--active-color);
            transform-origin: top center;
            transform: translateX(-50%) rotateZ(20deg) translateZ(-2px);
            pointer-events: none;
        }

        /* ── VIDEO MODAL + LETTERBOX ── */
        #letterbox-top, #letterbox-bottom {
            position: fixed; left: 0; width: 100%;
            height: 0; background: #000;
            z-index: 3500; transition: height 0.45s cubic-bezier(0.7,0,0.3,1);
            pointer-events: none;
        }
        #letterbox-top    { top: 0; }
        #letterbox-bottom { bottom: 0; }
        #letterbox-top.open, #letterbox-bottom.open { height: 10vh; }

        #video-modal {
            position: fixed; inset: 0;
            background: rgba(234,230,223,0.98);
            z-index: 4000;
            display: none; justify-content: center;
            align-items: center; flex-direction: column;
            opacity: 0; transition: opacity 0.4s ease;
            cursor: auto;
        }
        #video-modal.visible { opacity: 1; }
        .modal-container {
            position: relative; width: 85%; max-width: 1100px;
            aspect-ratio: 16/9; background: #000;
            border: 2px solid #111;
            box-shadow: 15px 15px 0 var(--text-color);
        }
        #video-frame { width: 100%; height: 100%; border: none; display: block; }
        .modal-close {
            position: absolute; top: -45px; right: 0;
            font-family: 'Press Start 2P', monospace; font-size: 10px;
            color: var(--active-color); background: none; border: none;
            cursor: pointer; text-transform: uppercase; padding: 10px;
            letter-spacing: 1px;
        }
        .project-label {
            position: absolute; bottom: -35px; left: 0;
            font-family: "Courier New", Courier, monospace; font-size: 12px;
            font-weight: 700; text-transform: uppercase; color: var(--text-color);
            letter-spacing: 2px;
        }

        /* ── KONAMI / CONTRA EASTER EGG ── */
        #konami-overlay {
            position: fixed; inset: 0;
            background: #000; z-index: 7500;
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s ease;
            cursor: none;
        }
        #konami-overlay.visible { opacity: 1; }
        #konami-canvas { display: block; image-rendering: pixelated; }
        #konami-msg {
            font-family: 'Press Start 2P', monospace;
            font-size: 11px; color: #fff;
            text-align: center; margin-top: 24px;
            letter-spacing: 2px; line-height: 2;
        }
        #konami-msg span { color: var(--active-color); }
        #konami-close-hint {
            font-family: 'Press Start 2P', monospace;
            font-size: 7px; color: #444;
            margin-top: 20px; letter-spacing: 1px;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 1200px) { #tilt-container { transform: scale(0.65) rotateX(68deg); } }
        @media (max-width: 800px)  {
            #tilt-container { transform: scale(0.45) rotateX(68deg); }
            .modal-container { width: 95%; }
            .system-block { top: 20px; left: 20px; }
        }
        @media (max-width: 500px)  { #tilt-container { transform: scale(0.3) rotateX(68deg); } }
    </style>
</head>

let audioCtx = null;
function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
}
function playTick() {
    try {
        const ctx = getAudioCtx();
        if (ctx.state === 'suspended') ctx.resume();
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1200, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(10, ctx.currentTime + 0.05);
        gain.gain.setValueAtTime(0.08, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.05);
    } catch(e) {}
}
function playBlip(freq=440, dur=0.08) {
    try {
        const ctx = getAudioCtx();
        if (ctx.state === 'suspended') ctx.resume();
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.type = 'square'; osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + dur);
    } catch(e) {}
}

// BUILD DIAL
// ═══════════════════════════════════════════
const dial      = document.getElementById('dial');
const itemCount = data.length;
const radius    = 450;
const items     = [];

data.forEach((itemData, index) => {
    const angle  = (index / itemCount) * 360;
    const itemEl = document.createElement('div');
    itemEl.className = 'item';
    itemEl.style.transform = `translate(-50%,-50%) rotateZ(${angle}deg) translateY(${radius}px)`;

    const img = document.createElement('img');
    img.src = itemData.img; img.alt = itemData.title;
    img.onerror = function(){ this.src = fallbackImg; };

    const cardWrapper = document.createElement('div');
    cardWrapper.className = 'card-wrapper';

    if (itemData.comingSoon) {
        const embossed = document.createElement('div');
        embossed.className = 'embossed-card';
        const lbl = document.createElement('span');
        lbl.textContent = 'COMING SOON';
        embossed.appendChild(lbl);
        cardWrapper.appendChild(embossed);
    } else {
        cardWrapper.appendChild(img);
    }

    cardWrapper.addEventListener('click', () => {
        if (itemData.comingSoon) {
            handleComingSoonClick(itemData.title);
        } else {
            handleItemClick(index);
        }
    });

    // Card tilt parallax on hover
    cardWrapper.addEventListener('mousemove', (e) => {
        if (!itemEl.classList.contains('active')) return;
        const rect = cardWrapper.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top  + rect.height / 2;
        const dx = (e.clientX - cx) / (rect.width  / 2);
        const dy = (e.clientY - cy) / (rect.height / 2);
        const tiltX =  dy * 8;
        const tiltY = -dx * 8;
        cardWrapper.style.transform =
            `translateZ(410px) rotateX(${90 + tiltX}deg) rotateY(${-65 + tiltY}deg) scale(1.2)`;
    });
    cardWrapper.addEventListener('mouseleave', () => {
        cardWrapper.style.transform = '';
    });

    itemEl.innerHTML = `
        <div class="line"></div>
        <div class="info">
            <div class="title">${itemData.title}</div>
            <div class="stats">
                <span class="role">${itemData.role}</span>
                <span class="year">${itemData.year}</span>
            </div>
        </div>`;
    itemEl.insertBefore(cardWrapper, itemEl.firstChild);
    dial.appendChild(itemEl);
    items.push(itemEl);
});

// ═══════════════════════════════════════════
// DIAL STATE
// ═══════════════════════════════════════════
const SELECTOR_ANGLE = 20;
let currentRot = 0, targetRot = 0;
let isDragging = false, isScrolling = false, scrollTimeout = null;
let startX = 0, lastDragX = 0, dragVelocity = 0;
let lastActiveIdx = -1;
let dialLocked = false; // locked during boot / konami
const scene = document.getElementById('scene');

scene.addEventListener('mousedown', (e) => {
    if (dialLocked || e.target.closest('.card-wrapper')) return;
    isDragging = true; startX = e.clientX; lastDragX = e.clientX; dragVelocity = 0;
});
window.addEventListener('mouseup', () => {
    if (isDragging) targetRot += dragVelocity * 6;
    isDragging = false;
});
window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    dragVelocity = e.clientX - lastDragX;
    lastDragX = e.clientX;
    targetRot += (e.clientX - startX) * 0.4;
    startX = e.clientX;
});
scene.addEventListener('wheel', (e) => {
    if (dialLocked) return;
    targetRot -= e.deltaY * 0.12; targetRot -= e.deltaX * 0.12;
    isScrolling = true; clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(() => { isScrolling = false; }, 125);
}, { passive: true });

let touchStartX = 0, lastTouchX = 0, touchVelocity = 0;
scene.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX; lastTouchX = touchStartX; touchVelocity = 0;
}, { passive:true });
scene.addEventListener('touchmove', (e) => {
    if (dialLocked) return;
    touchVelocity = e.touches[0].clientX - lastTouchX;
    lastTouchX = e.touches[0].clientX;
    targetRot += (e.touches[0].clientX - touchStartX) * 0.4;
    touchStartX = e.touches[0].clientX;
}, { passive:true });
scene.addEventListener('touchend', () => { targetRot += touchVelocity * 6; }, { passive:true });

// ═══════════════════════════════════════════
// KEYBOARD — shared handler
// ═══════════════════════════════════════════
document.addEventListener('keydown', (e) => {
    // konami takes priority
    if (konamiActive) { dismissKonami(); return; }
    // boot skip
    if (bootRunning) { skipBoot(); return; }
    // search open
    if (e.key === '/' && !searchOpen) { e.preventDefault(); openSearch(); return; }
    if (searchOpen) { if (e.key === 'Escape') closeSearch(); return; }
    // modal close
    if (e.key === 'Escape') { closeModal(); closeComingSoon(); return; }
    // konami buffer
    handleKonamiKey(e.key);
    // dial navigation
    const step = 360 / itemCount;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { if (!dialLocked) targetRot -= step; }
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { if (!dialLocked) targetRot += step; }
});

function handleComingSoonClick(title) {
    const modal = document.getElementById('coming-soon-modal');
    document.getElementById('coming-soon-project').innerText =
        'SOURCE_FILE: ' + title.replace(/[^a-zA-Z0-9]/g,'_').toUpperCase();
    modal.style.display = 'flex';
    requestAnimationFrame(() => requestAnimationFrame(() => modal.classList.add('visible')));
    document.body.style.cursor = 'auto';
}

function closeComingSoon() {
    const modal = document.getElementById('coming-soon-modal');
    modal.classList.remove('visible');
    setTimeout(() => { modal.style.display = 'none'; }, 400);
    document.body.style.cursor = 'none';
}

function handleItemClick(index) {
    if (items[index].classList.contains('active')) {
        const p = data[index];
        if (p.video) openModal(p.video, p.title);
    } else {
        const step = 360 / itemCount;
        targetRot = SELECTOR_ANGLE - (index * step);
    }
}

function openModal(videoUrl, title) {
    // letterbox first
    document.getElementById('letterbox-top').classList.add('open');
    document.getElementById('letterbox-bottom').classList.add('open');
    setTimeout(() => {
        const modal = document.getElementById('video-modal');
        document.getElementById('modal-project-title').innerText =
            "SOURCE_FILE: " + title.replace(/[^a-zA-Z0-9]/g,'_').toUpperCase();
        document.getElementById('video-frame').src = videoUrl;
        modal.style.display = 'flex';
        requestAnimationFrame(() => requestAnimationFrame(() => modal.classList.add('visible')));
        document.body.style.cursor = 'auto';
    }, 380);
}

function closeModal() {
    const modal = document.getElementById('video-modal');
    if (!modal.classList.contains('visible')) return;
    modal.classList.remove('visible');
    document.getElementById('letterbox-top').classList.remove('open');
    document.getElementById('letterbox-bottom').classList.remove('open');
    setTimeout(() => {
        modal.style.display = 'none';
        document.getElementById('video-frame').src = "";
    }, 400);
    document.body.style.cursor = 'none';
}

let searchOpen = false;
const searchOverlay = document.getElementById('search-overlay');
const searchInput   = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

function openSearch() {
    searchOpen = true;
    searchOverlay.classList.add('visible');
    searchInput.value = '';
    renderSearchResults('');
    setTimeout(() => searchInput.focus(), 50);
    document.body.style.cursor = 'auto';
    playBlip(600, 0.06);
}
function closeSearch() {
    searchOpen = false;
    searchOverlay.classList.remove('visible');
    document.body.style.cursor = 'none';
}
searchInput.addEventListener('input', () => renderSearchResults(searchInput.value));

function renderSearchResults(query) {
    const q = query.toLowerCase().trim();
    const matches = q === ''
        ? data.map((d,i) => ({d,i}))
        : data.map((d,i) => ({d,i})).filter(({d}) =>
            d.title.toLowerCase().includes(q) || d.tag.toLowerCase().includes(q));
    searchResults.innerHTML = '';
    matches.forEach(({d, i}) => {
        const row = document.createElement('div');
        row.className = 'search-result-item';
        row.innerHTML = `
            <span class="sr-idx">${String(i+1).padStart(2,'0')}</span>
            <span class="sr-title">${d.title}</span>`;
        row.addEventListener('click', () => {
            closeSearch();
            const step = 360 / itemCount;
            targetRot = SELECTOR_ANGLE - (i * step);
            playBlip(800, 0.08);
        });
        searchResults.appendChild(row);
    });
    if (matches.length === 0) {
        searchResults.innerHTML = `<div style="padding:20px 0;font-family:Courier New,monospace;font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;">NO RESULTS FOUND</div>`;
    }
}

// KONAMI CODE + CONTRA ANIMATION
// ═══════════════════════════════════════════
const KONAMI = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
let konamiBuffer = [];
let konamiActive = false;
let konamiAnimId = null;

function handleKonamiKey(key) {
    konamiBuffer.push(key);
    if (konamiBuffer.length > KONAMI.length) konamiBuffer.shift();
    if (konamiBuffer.join(',') === KONAMI.join(',')) {
        konamiBuffer = [];
        triggerKonami();
    }
}

function triggerKonami() {
    konamiActive = true;
    dialLocked = true;
    const overlay = document.getElementById('konami-overlay');
    overlay.style.display = 'flex';
    requestAnimationFrame(() => requestAnimationFrame(() => overlay.classList.add('visible')));
    document.body.style.cursor = 'none';
    startContraAnimation();
    playBlip(262, 0.1); setTimeout(()=>playBlip(330,0.1),120); setTimeout(()=>playBlip(392,0.1),240); setTimeout(()=>playBlip(523,0.3),360);
}

function dismissKonami() {
    konamiActive = false;
    dialLocked = false;
    const overlay = document.getElementById('konami-overlay');
    overlay.classList.remove('visible');
    setTimeout(() => { overlay.style.display = 'none'; }, 300);
    if (konamiAnimId) { cancelAnimationFrame(konamiAnimId); konamiAnimId = null; }
}

function startContraAnimation() {
    const canvas = document.getElementById('konami-canvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const S = 4; // pixel block size
    const FPS = 30;
    const INTERVAL = 1000 / FPS;
    let lastTime = 0;

    // ── SPRITES ──────────────────────────────
    // Player: 2-frame walk cycle (8px wide, 10px tall @ S=4 → 32x40px)
    const PLAYER = [
        ["00111100",
         "00111100",
         "01111110",
         "00110100",
         "01110110",
         "01111110",
         "00110100",
         "00110100",
         "01010100",
         "01000100"],
        ["00111100",
         "00111100",
         "01111110",
         "00110100",
         "01111110",
         "01110110",
         "00110100",
         "00110100",
         "00100110",
         "00100010"],
    ];

    // Enemy: 2-frame walk cycle (6px wide, 7px tall @ S=4 → 24x28px) — bigger target
    const ENEMY = [
        ["011110",
         "111111",
         "011110",
         "111111",
         "011110",
         "101001",
         "110011"],
        ["011110",
         "111111",
         "011110",
         "111111",
         "011110",
         "011010",
         "011011"],
    ];

    // Explosion: 3-frame burst
    const EXPLODE = [
        ["010","111","010"],
        ["101","010","101"],
        ["001","010","100"],
    ];

    function drawPixels(grid, x, y, color) {
        ctx.fillStyle = color;
        grid.forEach((row, ry) => {
            for (let rx = 0; rx < row.length; rx++) {
                if (row[rx] === '1') ctx.fillRect(x + rx*S, y + ry*S, S, S);
            }
        });
    }

    // ── STATE ─────────────────────────────────
    const GROUND_Y = H - 8;
    const PLAYER_Y = GROUND_Y - PLAYER[0].length * S;
    const ENEMY_H  = 7; // rows in enemy sprite
    const ENEMY_Y  = GROUND_Y - ENEMY_H * S;
    const BULLET_Y = ENEMY_Y + Math.floor(ENEMY_H / 2) * S; // mid-height of enemy

    // Stars — fixed positions, scroll by offset
    const STARS = Array.from({length:18}, (_, i) => ({
        x: (i * 73) % W,
        y: Math.floor((i * 37) % (H * 0.6)),
        size: (i % 3) + 1,
        speed: 0.3 + (i % 3) * 0.15,
    }));

    // Scrolling ground tiles
    const TILES = Array.from({length: Math.ceil(W/32)+2}, (_, i) => i * 32);

    // Player
    let px = 40; // fixed x position — world scrolls past
    let pframe = 0, pframeTick = 0;
    const PLAYER_SPEED = 0; // player stays put, world scrolls

    // Enemies — staggered evenly across the width, loop seamlessly
    const ENEMY_COUNT = 4;
    const enemies = Array.from({length: ENEMY_COUNT}, (_, i) => ({
        x: W + 80 + i * (W / ENEMY_COUNT),
        y: ENEMY_Y,
        speed: 1.8 + i * 0.4,
        frame: 0,
        frameTick: 0,
        exploding: false,
        explodeFrame: 0,
        explodeTick: 0,
    }));

    // Bullets
    const bullets = [];
    let shootTimer = 0;
    let tick = 0;
    let worldX = 0; // scrolling world offset

    // ── DRAW ──────────────────────────────────
    function draw() {
        ctx.clearRect(0, 0, W, H);

        // Background
        ctx.fillStyle = '#0a0a12';
        ctx.fillRect(0, 0, W, H);

        // Stars (parallax scroll)
        STARS.forEach(s => {
            const sx = ((s.x - worldX * s.speed) % W + W) % W;
            ctx.fillStyle = s.size > 2 ? '#aaaacc' : '#555577';
            ctx.fillRect(sx, s.y, s.size, s.size);
        });

        // Scrolling ground
        ctx.fillStyle = '#1a1a2a';
        ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
        ctx.fillStyle = '#D32F2F';
        ctx.fillRect(0, GROUND_Y, W, 2);

        // Ground detail tiles
        ctx.fillStyle = '#222233';
        TILES.forEach(tx => {
            const x = ((tx - worldX * 2) % (W + 32) + W + 32) % (W + 32) - 32;
            ctx.fillRect(x, GROUND_Y + 3, 20, 2);
        });

        // Player
        const pf = PLAYER[pframe];
        drawPixels(pf, px, PLAYER_Y, '#ff5555');
        // Gun barrel highlight
        ctx.fillStyle = '#ffaa44';
        ctx.fillRect(px + 7*S, PLAYER_Y + 4*S, S, S/2);

        // Bullets
        bullets.forEach(b => {
            ctx.fillStyle = '#ffff66';
            ctx.fillRect(b.x, b.y, S*2, S/2);
            // tracer trail
            ctx.fillStyle = 'rgba(255,200,0,0.3)';
            ctx.fillRect(b.x - S*2, b.y, S*2, S/2);
        });

        // Enemies
        enemies.forEach(en => {
            if (en.exploding) {
                const ef = EXPLODE[Math.min(en.explodeFrame, EXPLODE.length-1)];
                const colors = ['#ff8800','#ffff00','#ff4400'];
                drawPixels(ef, en.x - S, en.y - S, colors[en.explodeFrame % colors.length]);
            } else {
                drawPixels(ENEMY[en.frame], en.x, en.y, '#44ff88');
                // Eyes
                ctx.fillStyle = '#ff2222';
                ctx.fillRect(en.x + S, en.y + S, S, S);
            }
        });

        // HUD score-style text
        ctx.fillStyle = 'rgba(211,47,47,0.5)';
        ctx.font = `${S*2}px "Courier New"`;
        ctx.fillText('30 LIVES', W - 70, 16);
    }

    // ── UPDATE ────────────────────────────────
    function update() {
        tick++;
        worldX += 1.5; // world scrolls left

        // Player walk animation
        pframeTick++;
        if (pframeTick >= 8) { pframe = 1 - pframe; pframeTick = 0; }

        // Auto-shoot
        shootTimer++;
        if (shootTimer >= 15) {
            bullets.push({ x: px + 8*S, y: BULLET_Y });
            shootTimer = 0;
            playBlip(700 + Math.random()*200, 0.03);
        }

        // Move bullets
        for (let i = bullets.length - 1; i >= 0; i--) {
            bullets[i].x += 8;
            if (bullets[i].x > W + 20) bullets.splice(i, 1);
        }

        // Update enemies
        enemies.forEach(en => {
            if (en.exploding) {
                en.explodeTick++;
                if (en.explodeTick >= 4) {
                    en.explodeFrame++;
                    en.explodeTick = 0;
                }
                if (en.explodeFrame >= EXPLODE.length + 2) {
                    // Reset enemy to right side — seamless re-entry
                    en.x = W + 40 + Math.random() * 80;
                    en.exploding = false;
                    en.explodeFrame = 0;
                }
                return;
            }

            en.x -= en.speed;
            en.frameTick++;
            if (en.frameTick >= 10) { en.frame = 1 - en.frame; en.frameTick = 0; }

            // Seamless loop — when off left edge, wrap to right
            if (en.x < -20) {
                en.x = W + 40 + Math.random() * 60;
            }

            // Bullet hit check
            for (let bi = bullets.length - 1; bi >= 0; bi--) {
                const b = bullets[bi];
                if (b.x > en.x && b.x < en.x + 6*S &&
                    b.y > en.y && b.y < en.y + ENEMY_H*S) {
                    bullets.splice(bi, 1);
                    en.exploding = true;
                    en.explodeFrame = 0;
                    en.explodeTick = 0;
                    playBlip(180 + Math.random()*80, 0.08);
                    break;
                }
            }
        });
    }

    // ── LOOP (locked to FPS) ──────────────────
    function loop(timestamp) {
        if (!konamiActive) return;
        const delta = timestamp - lastTime;
        if (delta >= INTERVAL) {
            lastTime = timestamp - (delta % INTERVAL);
            update();
            draw();
        }
        konamiAnimId = requestAnimationFrame(loop);
    }
    konamiAnimId = requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════
// BOOT SEQUENCE
// ═══════════════════════════════════════════
let bootRunning = true;
const BOOT_KEY = 'cmcneilly_booted';
const bootLines = [
    { text: "MCNEILLY VFX SYSTEMS v2.4.1", cls: "" },
    { text: "Copyright (C) Conor McNeilly. All rights reserved.", cls: "dim" },
    { text: "——————————————————————————————————", cls: "dim" },
    { text: "Initializing display driver............. OK", cls: "" },
    { text: "Loading asset registry.................. OK", cls: "" },
    { text: "Calibrating radial index system......... OK", cls: "" },
    { text: "Checking frame buffers (34 entries)..... OK", cls: "" },
    { text: "Mounting VFX archive.................... OK", cls: "" },
    { text: "Audio subsystem......................... READY", cls: "" },
    { text: "——————————————————————————————————", cls: "dim" },
    { text: "WARNING: Unauthorized access prohibited.", cls: "red" },
    { text: "——————————————————————————————————", cls: "dim" },
    { text: "SYSTEM READY. LOADING PORTFOLIO...", cls: "red" },
];

function runBoot() {
    const bootScreen = document.getElementById('boot-screen');
    const linesEl    = document.getElementById('boot-lines');
    dialLocked = true;
    let i = 0;

    function addLine() {
        if (i >= bootLines.length) {
            setTimeout(finishBoot, 600);
            return;
        }
        const span = document.createElement('span');
        span.className = 'line ' + bootLines[i].cls;
        span.textContent = '> ' + bootLines[i].text;
        // append cursor to last line
        if (i === bootLines.length - 1) {
            const cur = document.createElement('span');
            cur.id = 'boot-cursor'; span.appendChild(cur);
        }
        linesEl.appendChild(span);
        requestAnimationFrame(() => span.classList.add('show'));
        playBlip(300 + Math.random()*200, 0.03);
        i++;
        setTimeout(addLine, 80 + Math.random() * 80);
    }
    addLine();
}

function finishBoot() {
    bootRunning = false;
    dialLocked = false;
    const bootScreen = document.getElementById('boot-screen');
    bootScreen.classList.add('fade-out');
    setTimeout(() => { bootScreen.style.display = 'none'; }, 700);
    try { localStorage.setItem(BOOT_KEY, '1'); } catch(e){}
}

function skipBoot() {
    bootRunning = false;
    dialLocked = false;
    const bootScreen = document.getElementById('boot-screen');
    bootScreen.classList.add('fade-out');
    setTimeout(() => { bootScreen.style.display = 'none'; }, 300);
    try { localStorage.setItem(BOOT_KEY, '1'); } catch(e){}
}

// Only show boot on first-ever visit
try {
    if (localStorage.getItem(BOOT_KEY)) {
        // already booted before — skip instantly
        document.getElementById('boot-screen').style.display = 'none';
        bootRunning = false;
        dialLocked = false;
    } else {
        runBoot();
    }
} catch(e) {
    // localStorage blocked — show boot anyway
    runBoot();
}

// ═══════════════════════════════════════════
// MAIN ANIMATION LOOP
// ═══════════════════════════════════════════
function animate() {
    const step = 360 / itemCount;

    if (!isDragging && !isScrolling) {
        let offset = (targetRot - SELECTOR_ANGLE) % step;
        if (offset >  step/2) offset -= step;
        if (offset < -step/2) offset += step;
        targetRot -= offset * 0.2;
    }

    currentRot += (targetRot - currentRot) * 0.16;
    dial.style.transform = `rotateZ(${currentRot}deg)`;

    let exactIndex  = (SELECTOR_ANGLE - currentRot) / step;
    let activeIndex = Math.round(exactIndex) % itemCount;
    if (activeIndex < 0) activeIndex += itemCount;

    if (activeIndex !== lastActiveIdx) {
        if (lastActiveIdx !== -1) playTick();
        lastActiveIdx = activeIndex;
        document.getElementById('meta-idx').innerText = String(activeIndex+1).padStart(2,'0');
    }

    items.forEach((item, i) => {
        const wasActive = item.classList.contains('active');
        const isActive  = i === activeIndex;
        item.classList.toggle('active', isActive);
        // if card just lost active, clear any lingering inline tilt transform
        if (wasActive && !isActive) {
            item.querySelector('.card-wrapper').style.transform = '';
        }
    });

    let displayDeg = (SELECTOR_ANGLE - currentRot) % 360;
    if (displayDeg < 0) displayDeg += 360;
    document.getElementById('degree-indicator').innerText = Math.round(displayDeg) + '°';

    requestAnimationFrame(animate);
}
animate();
